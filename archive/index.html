<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文化晨报归档</title>
  <meta name="description" content="全球文化晨报历史归档页面。" />
  <style>
    :root {
      --bg: #f7f5ef;
      --paper: #fffdf8;
      --ink: #1f1f1f;
      --muted: #6b6b6b;
      --line: #e7e0d4;
      --accent: #7a4b2a;
      --accent-soft: #f4ece5;
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
      --maxw: 860px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.75;
    }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 28px 18px 72px; }
    .hero, .card { background: var(--paper); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow); }
    .hero { padding: 28px 24px; margin-bottom: 20px; }
    .card { padding: 22px 20px; }
    .eyebrow { display: inline-block; font-size: 13px; color: var(--accent); background: var(--accent-soft); border-radius: 999px; padding: 6px 12px; margin-bottom: 12px; }
    h1 { margin: 0 0 10px; font-size: 32px; }
    p { margin: 0; color: var(--muted); }
    .list { margin-top: 18px; }
    .entry { display: block; padding: 16px 0; border-top: 1px dashed var(--line); color: inherit; text-decoration: none; }
    .entry:first-child { border-top: none; padding-top: 0; }
    .entry:hover h2 { text-decoration: underline; }
    .entry h2 { margin: 0 0 6px; font-size: 20px; color: var(--accent); }
    .entry .meta { font-size: 14px; color: var(--muted); }
    .home { display: inline-block; margin-top: 16px; color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">Archive</div>
      <h1>文化晨报归档</h1>
      <p>这里只保留最近 10 期《全球文化晨报》。首页永远展示最新一期。</p>
      <a class="home" href="../index.html">← 返回首页</a>
    </section>

    <section class="card list">
      <a class="entry" href="./2026-03-10.html">
        <h2>2026-03-10｜全球文化晨报</h2>
        <div class="meta">公开归档版本</div>
      </a>
      <a class="entry" href="./2026-03-09.html">
        <h2>2026-03-09｜全球文化晨报</h2>
        <div class="meta">公开归档版本</div>
      </a>
      <a class="entry" href="./2026-03-08.html">
        <h2>2026-03-08｜全球文化晨报</h2>
        <div class="meta">公开归档版本</div>
      </a>
    </section>
  </main>
</body>
</html>
